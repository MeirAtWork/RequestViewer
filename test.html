<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JSON Viewer Demo</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        h1, button, textarea { margin: 10px 20px; }
        #viewer { flex: 1; border: 1px solid #ccc; margin: 0 20px 20px 20px; min-height: 0; }
        textarea { height: 100px; resize: none; }
    </style>
    <!-- Add ID so script doesn't try to load it again, and point to correct path -->
    <link id="simple-json-viewer-style" rel="stylesheet" href="src/simpleJsonViewer.css">
</head>
<body>
    <h1>Simple JSON Viewer Demo</h1>
    <textarea id="input" placeholder="Paste JSON here...">{
    "string": "Created https://example.com/foobar",
    "number": 123,
    "boolean": true,
    "null": null,
    "array": [1, 2, "three", { "nested": "object" }],
    "object": {
        "key1": "value1",
        "key2": "value2"
    },
    "deep": {
        "l1": {
            "l2": {
                "l3": "deep value"
            }
        }
    }
}</textarea>
    <button onclick="loadJson()">Load JSON</button>
    <div id="viewer"></div>

    <script src="src/simpleJsonViewer.js"></script>
    <script>
        function loadJson() {
            const input = document.getElementById('input').value;
            const container = document.getElementById('viewer');
            try {
                // Clear previous
                container.innerHTML = ''; 
                // Using the global function
                window.createJsonViewer(container, input);
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }
        
        // Load default
        window.addEventListener('DOMContentLoaded', loadJson);
    </script>
</body>
</html>
